<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日常清单</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app" class="widget">
    <div class="widget-header" id="widget-header">
      <span class="widget-title" id="checklist-title" contenteditable="true" spellcheck="false">今日清单</span>
      <div class="header-actions">
        <button class="icon-btn" id="btn-pin" title="置顶">📌</button>
        <button class="icon-btn" id="btn-opacity" title="透明度">◐</button>
        <button class="icon-btn" id="btn-more" title="更多">⋯</button>
      </div>
    </div>

    <div class="opacity-bar" id="opacity-bar" style="display:none;">
      <input type="range" id="opacity-slider" min="30" max="100" value="92" />
      <span id="opacity-label">92%</span>
    </div>

    <div class="progress-row">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <span class="progress-text" id="progress-text">0/0</span>
    </div>

    <div class="add-row">
      <input type="text" id="new-todo-input" placeholder="添加事项..." />
      <button class="add-btn" id="btn-add-todo">+</button>
    </div>

    <div class="todo-list" id="todo-list"></div>

    <div class="more-menu" id="more-menu" style="display:none;">
      <button class="menu-item" id="btn-new-checklist">📝 新建清单</button>
      <button class="menu-item" id="btn-history">📅 历史清单</button>
      <button class="menu-item" id="btn-theme">🎨 切换主题</button>
      <button class="menu-item" id="btn-templates">📄 模板</button>
      <button class="menu-item" id="btn-recycle-bin">🗑️ 回收站</button>
      <button class="menu-item" id="btn-export">📤 导出</button>
      <button class="menu-item danger" id="btn-delete-checklist">🗑️ 删除清单</button>
    </div>

    <div class="modal-overlay" id="modal-history" style="display:none;">
      <div class="modal">
        <div class="modal-header">
          <span>历史清单</span>
          <button class="icon-btn modal-close" data-modal="modal-history">✕</button>
        </div>
        <div class="modal-body">
          <div class="history-list" id="history-list"></div>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="modal-templates" style="display:none;">
      <div class="modal">
        <div class="modal-header">
          <span>模板管理</span>
          <button class="icon-btn modal-close" data-modal="modal-templates">✕</button>
        </div>
        <div class="modal-body">
          <div class="template-save-row">
            <input type="text" id="template-name-input" placeholder="模板名称" />
            <button class="add-btn" id="btn-save-template">+</button>
          </div>
          <div class="template-list" id="template-list"></div>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="modal-recycle-bin" style="display:none;">
      <div class="modal">
        <div class="modal-header">
          <span>回收站</span>
          <button class="icon-btn modal-close" data-modal="modal-recycle-bin">✕</button>
        </div>
        <div class="modal-body">
          <div class="recycle-toolbar">
            <span id="recycle-bin-hint">暂无已删除的清单</span>
            <button class="text-btn danger" id="btn-empty-bin" style="display:none;">清空</button>
          </div>
          <div class="recycle-list" id="recycle-bin-list"></div>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="modal-edit-todo" style="display:none;">
      <div class="modal">
        <div class="modal-header">
          <span>编辑事项</span>
          <button class="icon-btn modal-close" data-modal="modal-edit-todo">✕</button>
        </div>
        <div class="modal-body">
          <div class="edit-field">
            <input type="text" id="edit-todo-text" placeholder="事项内容" />
          </div>
          <div class="edit-field-row">
            <select id="edit-todo-priority">
              <option value="high">高优先</option>
              <option value="medium">中优先</option>
              <option value="low">低优先</option>
            </select>
            <input type="datetime-local" id="edit-todo-reminder" />
          </div>
          <div class="edit-actions">
            <button class="primary-btn" id="btn-save-edit">保存</button>
            <button class="text-btn modal-close" data-modal="modal-edit-todo">取消</button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="modal-confirm" style="display:none;">
      <div class="modal">
        <div class="modal-header">
          <span id="confirm-title">确认</span>
          <button class="icon-btn modal-close" data-modal="modal-confirm">✕</button>
        </div>
        <div class="modal-body">
          <p id="confirm-message"></p>
          <div class="edit-actions">
            <button class="primary-btn" id="btn-confirm-ok">确认</button>
            <button class="text-btn modal-close" data-modal="modal-confirm">取消</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
